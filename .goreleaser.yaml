version: 2
report_sizes: true

builds:
  - builder: bun
    main: cli.ts
    flags:
      - --compile
      - --minify
      - --sourcemap
      - --asset-naming="[name].[ext]"

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - url_template: "https://github.com/robertwang1001/proyecto/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    directory: Formula
    # Caveats for the user of your binary.
    caveats: proyecto --help
    homepage: "https://github.com/robertwang1001/proyecto"
    description: Proyecto is a lightweight CLI tool for managing local projects
    license: MIT
    test: system "#{bin}/proyecto --version"
    # Repository to push the generated files to.
    repository:
      owner: robertwang1001
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_GITHUB_TOKEN }}"
